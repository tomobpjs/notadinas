<script type="module">
    // 1. Impor semua fungsi yang dibutuhkan (SDK Modular v9+)
    import { initializeApp } from "firebase/app";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";
    import { 
        getFirestore, collection, addDoc, query, onSnapshot, doc, updateDoc 
    } from "firebase/firestore";

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAOAMNE1yBVB09dbO-4Rr-D7KPODU0-694",
        authDomain: "notadinasrt.firebaseapp.com",
        projectId: "notadinasrt",
        storageBucket: "notadinasrt.firebasestorage.app",
        messagingSenderId: "96523383307",
        appId: "1:96523383307:web:9a0bc43bd7f6375e050d0e"
    };

    // 2. Inisialisasi Firebase & Variabel Global
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    let pengajuanData = [];
    let user = null;

    // UI Helpers
    const updateSyncIndicator = (status, colorClass) => {
        const el = document.getElementById('sync-indicator');
        if (el) {
            el.innerHTML = `<i class="fas fa-cloud mr-2"></i> ${status}`;
            el.className = `fixed bottom-5 right-5 px-3 py-1.5 rounded-full text-[10px] font-bold z-50 no-print border ${colorClass}`;
        }
    };

    // 3. Fungsi Autentikasi
    const initAuth = async () => {
        try {
            await signInAnonymously(auth);
        } catch (err) {
            console.error("Auth failed:", err);
            updateSyncIndicator("Auth Error", "bg-red-900/20 text-red-500 border-red-500/50");
        }
    };

    onAuthStateChanged(auth, (u) => {
        user = u;
        if (user) {
            document.getElementById('user-display').innerText = user.uid.substring(0, 8);
            setupRealtimeSync();
        }
    });

    initAuth();

    // 4. Sinkronisasi Data Real-time
    function setupRealtimeSync() {
        if (!user) return;
        
        // Menggunakan koleksi 'nota-pengajuan'
        const q = query(collection(db, 'nota-pengajuan'));
        updateSyncIndicator("Syncing...", "bg-blue-900/20 text-blue-500 border-blue-500/50");

        onSnapshot(q, (snapshot) => {
            pengajuanData = snapshot.docs.map(doc => ({ dbId: doc.id, ...doc.data() }));
            pengajuanData.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            renderDashboard();
            renderDatabase();
            updateSyncIndicator("Connected", "bg-emerald-900/20 text-emerald-500 border-emerald-500/50");
        }, (err) => {
            console.error("Firestore error:", err);
            updateSyncIndicator("Offline/Error", "bg-red-900/20 text-red-500 border-red-500/50");
        });
    }

    // 5. Fungsi Penanganan Form (Submit)
    document.getElementById('formPengajuan').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!user) return alert("Koneksi belum siap.");

        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.innerText = "MENYIMPAN...";

        const dateInput = document.getElementById('inputTanggal').value;
        const kat = document.getElementById('inputKategori').value;
        
        // Generate Kode Tiket Sederhana
        const kode = `${kat === "Nota Dinas" ? 'ND' : 'FORM'}-${Date.now().toString().slice(-4)}`;

        const items = Array.from(document.querySelectorAll('#barangBody tr')).map(row => ({
            id: Math.random().toString(36).substr(2, 9),
            nama: row.querySelector('.item-nama').value,
            spek: row.querySelector('.item-spek').value,
            jumlah: row.querySelector('.item-jumlah').value,
            alasan: row.querySelector('.item-alasan').value,
            status: 'Pending'
        }));

        try {
            await addDoc(collection(db, 'nota-pengajuan'), {
                kode,
                kategori: kat,
                tanggal: dateInput,
                pemohon: document.getElementById('inputPemohon').value,
                unit: document.getElementById('inputUnit').value,
                timestamp: Date.now(),
                items: items
            });
            
            e.target.reset();
            alert("Berhasil disimpan!");
            switchTab('dashboard');
        } catch (err) {
            console.error(err);
            alert("Gagal menyimpan data.");
        } finally {
            btn.disabled = false;
            btn.innerText = "SIMPAN PENGAJUAN";
        }
    });

    // 6. Fungsi Render UI
    window.renderDashboard = () => {
        const body = document.getElementById('recent-activity-body');
        body.innerHTML = '';
        pengajuanData.slice(0, 5).forEach(r => {
            body.innerHTML += `
                <tr class="hover:bg-slate-800/30 border-b border-slate-800/50">
                    <td class="py-3 font-mono text-blue-400 font-bold">${r.kode}</td>
                    <td class="py-3 text-slate-300">${r.pemohon}</td>
                    <td class="py-3 text-slate-500">${r.kategori}</td>
                    <td class="py-3 text-slate-500">${r.tanggal}</td>
                    <td class="py-3"><span class="status-badge-base badge-done">Cloud</span></td>
                </tr>`;
        });
    };

    window.renderDatabase = () => {
        const body = document.getElementById('databaseBody');
        body.innerHTML = '';
        pengajuanData.forEach(entry => {
            entry.items.forEach(item => {
                body.innerHTML += `
                    <tr class="hover:bg-slate-800/30">
                        <td class="p-4 font-mono text-blue-400">${entry.kode}<br><span class="text-slate-500">${entry.tanggal}</span></td>
                        <td class="p-4">${entry.pemohon}<br><span class="text-[9px] text-slate-500">${entry.unit}</span></td>
                        <td class="p-4"><b>${item.nama}</b><br><span class="text-slate-500">${item.spek}</span></td>
                        <td class="p-4"><span class="status-badge-base badge-pending">${item.status}</span></td>
                        <td class="p-4 text-slate-400">${item.alasan || '-'}</td>
                        <td class="p-4 text-center"><button class="text-blue-500"><i class="fas fa-edit"></i></button></td>
                    </tr>`;
            });
        });
    };

    // Fungsi Tambah/Hapus Baris
    window.addRow = () => {
        const tr = document.createElement('tr');
        tr.className = "border-b border-slate-800/30";
        tr.innerHTML = `
            <td class="py-2 pr-2"><input type="text" class="input-field item-nama" required></td>
            <td class="py-2 pr-2"><input type="text" class="input-field item-spek"></td>
            <td class="py-2 pr-2"><input type="number" class="input-field item-jumlah" required></td>
            <td class="py-2 pr-2"><input type="text" class="input-field item-alasan"></td>
            <td class="py-2 text-center"><button type="button" onclick="removeRow(this)" class="text-slate-600 hover:text-red-500"><i class="fas fa-trash"></i></button></td>
        `;
        document.getElementById('barangBody').appendChild(tr);
    };

    window.removeRow = (btn) => {
        if(document.querySelectorAll('#barangBody tr').length > 1) btn.closest('tr').remove();
    };

    window.switchTab = (id) => {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById(`tab-${id}`).classList.remove('hidden');
        document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
        document.getElementById(`nav-${id}`)?.classList.add('active');
    };
</script>
